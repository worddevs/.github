# 🌸✨ Word Devs — Greetings Workflow
# Automatically welcomes anyone who opens their first Issue or Pull Request
# in any repository across the organization.
# Docs: https://github.com/actions/first-interaction

name: "🎀 Greetings"

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    name: "👋 Say hi to newcomers"
    runs-on: ubuntu-latest
    steps:
      - name: "🌸 Greet first-time contributors"
        uses: actions/first-interaction@v1
        with:
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

          issue-message: |
            ### (っ◕‿◕)っ Hello and welcome to Word Devs! 🌸✨

            Thank you so much for opening your very first issue here! We are a small team, but we put a lot of love into what we do, so we truly appreciate you taking the time to report this. 💜

            Just a few quick things before we proceed:

            - 📋 If you haven't already, please double-check that your issue contains all the necessary details (steps, version, logs, etc.) so we can help you out faster.
            - 🌸 Take a quick peek at our [Code of Conduct](../blob/main/.github/CODE_OF_CONDUCT.md) to see how we keep our community friendly.
            - 💬 If you have general questions (rather than a specific bug), our [Discussions](https://github.com/orgs/worddevs/discussions) section might be a better place!

            Someone from our team will review this shortly. Thanks again for joining our community! 🎀

            *— The Word Devs Team* 🐾

          pr-message: |
            ### ヽ(・∀─)ﾉ Wow, your first Pull Request in Word Devs! 🎉💜

            Thank you so much for contributing your code! This means the absolute world to us. 🌸

            Before we jump into the review, please make sure that:

            - ✅ Your PR completes the checklist from our [Contributing Guidelines](../blob/main/.github/CONTRIBUTING.md).
            - 🧪 Any tests (if applicable) are passing in the checks below.
            - 📝 The description clearly explains what you changed and why.

            Someone from the team will review your PR as soon as possible. Thank you for helping Word Devs grow with us! ✨

            *— The Word Devs Team* 🐾
