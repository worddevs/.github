# 🔒✨ Word Devs — Lock Threads Workflow
# Automatically locks issues and PRs that have been closed for 30 days
# to prevent spam and encourage new, clean tickets.
# Docs: https://github.com/dessant/lock-threads

name: "🎀 Lock Threads"

on:
  schedule:
    - cron: "0 0 * * *" # Runs every day at midnight
  workflow_dispatch: # Allows manual trigger if needed

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: lock-threads

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - name: "🔒 Lock closed issues and PRs"
        uses: dessant/lock-threads@v5
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

          # Number of days of inactivity before locking
          issue-inactive-days: "30"
          pr-inactive-days: "30"

          # Message to post before locking
          issue-comment: |
            ### (っ˘̩╭╮˘̩)っ This thread has been locked! 🔒✨

            Hey there! This issue has been closed for **30 days** and inactive, so we are locking it to keep our repository clean and prevent spam comments. 

            - 🌸 **Need to report a similar bug?** Please open a brand new [Bug Report](../issues/new?template=bug_report.md) with updated details.
            - 💬 **Have general questions?** Feel free to start a thread in [Discussions](https://github.com/orgs/worddevs/discussions).

            Thank you for helping us keep Word Devs organized! 💜

            *— The Word Devs Team* 🐾

          pr-comment: |
            ### (っ˘̩╭╮˘̩)っ This Pull Request has been locked! 🔒✨

            Hey there! This PR has been closed/merged for **30 days** and inactive, so we are locking it to keep our repository clean and organized.

            - 🌸 **Found a new issue or want to suggest a change?** Please open a new [Issue](../issues/new/choose) or a fresh Pull Request.
            - 💬 **Want to discuss code design?** Let's talk over at [Discussions](https://github.com/orgs/worddevs/discussions)!

            Thank you for your valuable contributions! 💜

            *— The Word Devs Team* 🐾
